<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letter-Digit Chat</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f1f5f9; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; min-height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 500px; background: var(--card); padding: 20px; display: flex; flex-direction: column; }
        input, select, button { padding: 12px; margin: 5px 0; border-radius: 8px; border: none; font-size: 16px; }
        input { background: #334155; color: white; }
        button { background: var(--accent); color: #0f172a; font-weight: bold; cursor: pointer; }
        .chat-box { flex-grow: 1; overflow-y: auto; background: #0f172a; border-radius: 8px; padding: 10px; margin: 10px 0; border: 1px solid #334155; min-height: 300px; }
        .msg { margin-bottom: 10px; padding: 8px; border-radius: 5px; background: #334155; }
        .msg b { color: var(--accent); display: block; font-size: 12px; }
        .hidden { display: none !important; }
        .room-info { text-align: center; font-weight: bold; color: var(--accent); margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <h2 style="text-align: center;">Join Secret Chat</h2>
        <input type="text" id="username" placeholder="Username Anda">
        
        <div style="display: flex; gap: 10px;">
            <select id="letter" style="flex: 1;">
                <script>
                    for(let i=65; i<=90; i++) document.write(`<option value="${String.fromCharCode(i)}">${String.fromCharCode(i)}</option>`);
                </script>
            </select>
            <input type="number" id="digit" placeholder="3 Digit (000-999)" style="flex: 2;" min="0" max="999">
        </div>
        
        <button onclick="joinChat()">Masuk Ruangan</button>
    </div>

    <div id="chat-screen" class="hidden">
        <div class="room-info" id="current-room-display">Room: A-001</div>
        <div class="chat-box" id="chat-box"></div>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="message-input" placeholder="Ketik pesan..." style="flex-grow: 1;">
            <button onclick="sendMessage()">Kirim</button>
        </div>
        <button onclick="location.reload()" style="background: #ef4444; margin-top: 10px;">Keluar</button>
    </div>
</div>

<script>
    // --- KONFIGURASI FIREBASE ---
    // GANTI DENGAN PUNYA ANDA SENDIRI DARI FIREBASE CONSOLE
   const firebaseConfig = {
  apiKey: "AIzaSyC3M6Me_pBwykr3Y-EAEnJGQlOE3U7fMCo",
  authDomain: "markichat.firebaseapp.com",
  projectId: "markichat",
  storageBucket: "markichat.firebasestorage.app",
  messagingSenderId: "447816707968",
  appId: "1:447816707968:web:1ec43ae950702e946e5b65",
  measurementId: "G-FZBDG67QLV"
};
    
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentRoom = "";
let user = "";
let isFirstLoad = true; // Untuk mencegah notifikasi membanjir saat pertama buka chat

// 1. Minta Izin Notifikasi saat halaman dimuat
if ("Notification" in window) {
    Notification.requestPermission();
}

// Efek Suara (Opsional: Gunakan link mp3 yang valid)
const notificationSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3');

function joinChat() {
    user = document.getElementById('username').value.trim();
    const letter = document.getElementById('letter').value;
    let digit = document.getElementById('digit').value.padStart(3, '0');

    if(!user || !digit) return alert("Isi username dan 3 digit!");
    
    currentRoom = `${letter}_${digit}`;
    document.getElementById('current-room-display').innerText = `Ruangan: ${letter} - ${digit}`;
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('chat-screen').classList.remove('hidden');

    listenForMessages();
}

function listenForMessages() {
    // Menggunakan limitToLast agar tidak berat saat chat sudah banyak
    const chatRef = db.ref('chats/' + currentRoom).limitToLast(20);
    
    chatRef.on('child_added', (snapshot) => {
        const m = snapshot.val();
        const chatBox = document.getElementById('chat-box');
        
        // Tampilkan di layar
        const msgDiv = document.createElement('div');
        msgDiv.className = 'msg';
        msgDiv.innerHTML = `<b>${m.user}</b>${m.message}`;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        // 2. Logika Notifikasi
        // Kirim notifikasi HANYA JIKA:
        // - Bukan pesan dari diri sendiri
        // - Bukan saat loading awal (isFirstLoad = false)
        if (!isFirstLoad && m.user !== user) {
            sendNotification(m.user, m.message);
        }
    });

    // Set isFirstLoad ke false setelah data awal selesai dimuat
    chatRef.once('value', () => {
        isFirstLoad = false;
    });
}

function sendNotification(sender, message) {
    // Mainkan Suara
    notificationSound.play();

    // Notifikasi Visual Browser
    if (Notification.permission === "granted") {
        const notif = new Notification(`Pesan baru dari ${sender}`, {
            body: message,
            icon: 'https://cdn-icons-png.flaticon.com/512/733/733585.png' // Icon bebas
        });

        // Klik notifikasi untuk balik ke tab chat
        notif.onclick = () => {
            window.focus();
            notif.close();
        };
    }
}

function sendMessage() {
    const msgInput = document.getElementById('message-input');
    const text = msgInput.value.trim();
    if(!text) return;

    db.ref('chats/' + currentRoom).push({
        user: user,
        message: text,
        timestamp: Date.now()
    });

    msgInput.value = "";
}

document.getElementById('message-input').addEventListener('keypress', (e) => {
    if(e.key === 'Enter') sendMessage();
});
</script>

</body>
</html>
